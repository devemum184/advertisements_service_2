version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: advertisements
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/advertisements
      SECRET_KEY: secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_HOURS: 48
    volumes:
      - ./app:/app/app

volumes:
  postgres_data: